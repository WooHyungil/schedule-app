<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" role="img" aria-label="schedule icon">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect x="12" y="12" width="168" height="168" rx="42" fill="url(#g1)" filter="url(#shadow)"/>
  
  <!-- 달력 카드 -->
  <g>
    <!-- 흰 바탕 -->
    <rect x="38" y="50" width="116" height="110" rx="16" fill="#ffffff" opacity="0.98"/>
    
    <!-- 상단 날짜 표시 -->
    <rect x="38" y="50" width="116" height="36" rx="16" fill="#667eea" opacity="0.15"/>
    <text x="96" y="75" font-size="24" font-weight="bold" fill="#667eea" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">26</text>
    
    <!-- 요일 표시 -->
    <text x="52" y="107" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">월</text>
    <text x="75" y="107" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">화</text>
    <text x="96" y="107" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">수</text>
    <text x="117" y="107" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">목</text>
    <text x="140" y="107" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">금</text>
    
    <!-- 날짜 칸들 -->
    <circle cx="52" cy="125" r="8" fill="#c084fc" opacity="0.3"/>
    <circle cx="75" cy="125" r="8" fill="#667eea" opacity="0.2"/>
    <circle cx="96" cy="125" r="8" fill="#667eea" opacity="0.2"/>
    <circle cx="117" cy="125" r="8" fill="#667eea" opacity="0.2"/>
    <circle cx="140" cy="125" r="8" fill="#667eea" opacity="0.2"/>
    
    <circle cx="52" cy="145" r="8" fill="#667eea" opacity="0.2"/>
    <circle cx="75" cy="145" r="8" fill="#667eea" opacity="0.2"/>
    <circle cx="96" cy="145" r="8" fill="#f093fb" opacity="0.3"/>
    
    <!-- 강조 점 -->
    <circle cx="52" cy="125" r="5" fill="#c084fc"/>
    <circle cx="96" cy="145" r="5" fill="#f093fb"/>
  </g>
</svg>
